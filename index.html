<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Список покупок</title>

<style>

body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

h1{text-align:center;}

ul{list-style:none; padding:0;}

li{
  background:white;
  padding:18px 20px;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-radius:12px;
  font-size:18px;
}

.leftPart{
  display:flex;
  align-items:center;
  gap:10px;
}

.itemAmount{
  display:flex;
  align-items:center;
  gap:6px;
  color:#555;
  font-size:14px;
}

.itemAmount button{
  padding:4px 8px;
}

.doneText{
  text-decoration:line-through;
  color:gray;
}

.sectionTitle{
  margin-top:30px;
  font-weight:bold;
}

/* кнопка + */

.fab{
  position:fixed;
  bottom:25px;
  right:25px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:32px;
  background:#2ecc71;
  color:white;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* окно */

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalContent{
  background:white;
  padding:20px;
  border-radius:10px;
  width:260px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.modalContent input,
.modalContent select{
  padding:8px;
  font-size:16px;
}

.modalContent button{
  padding:8px;
}

/* Анимация синхронизации */
@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.syncing {
  animation: rotate 1s linear infinite;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>

<body>

<h1>🛒 Список покупок</h1>

<!-- Поиск и кнопка синхронизации -->
<div style="display:flex;align-items:center;gap:10px;margin:10px 0 20px 0;">

  <div style="position:relative;flex:1;max-width:300px;">
    <input 
      id="searchInput"
      placeholder="🔍 Поиск..."
      oninput="render();toggleClear()"
      style="width:100%;padding:8px 30px 8px 10px;font-size:15px;border-radius:8px;border:1px solid #ccc;"
    >
    <span 
      id="clearSearch"
      onclick="clearSearch()"
      style="position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;color:#888;display:none;"
    >✖</span>
  </div>

  <div id="syncContainer" style="position:relative; margin-left:10px; cursor:pointer;" onclick="manualSync()">
    <span id="syncIcon" style="display:inline-block; font-size:20px;">🔄</span>
  </div>

</div>

<div class="sectionTitle">🧺 Нужно купить</div>
<ul id="todoList"></ul>

<div class="sectionTitle">✅ Куплено</div>
<ul id="doneList"></ul>

<button class="fab" onclick="openModal()">+</button>

<!-- Модальное окно добавления -->
<div class="modal" id="modal">
  <div class="modalContent">
    <input id="nameInput" placeholder="Название товара">
    <input id="amountInput" type="number" placeholder="Количество">
    <select id="unitInput">
      <option value="шт">шт</option>
      <option value="кг">кг</option>
      <option value="г">г</option>
      <option value="л">л</option>
      <option value="уп">уп</option>
    </select>
    <button onclick="addItem()">OK</button>
    <button onclick="closeModal()">Отмена</button>
  </div>
</div>

<!-- Модальное окно редактирования единицы -->
<div class="modal" id="unitModal">
  <div class="modalContent">
    <b>Выберите единицу</b>
    <button onclick="setUnit('шт')">шт</button>
    <button onclick="setUnit('кг')">кг</button>
    <button onclick="setUnit('г')">г</button>
    <button onclick="setUnit('л')">л</button>
    <button onclick="setUnit('уп')">уп</button>
    <button onclick="closeUnitModal()">Отмена</button>
  </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxS1TAlGtBXdksEppy27IksJfLF8L02M-OV7v6rR8MbgRfFJXxrAj2WDtUEo9nQWevV/exec"

let editUnitIndex=null
let editUnitList=null
let todo=[]
let done=[]
let lastData=""
let searchText=""

// Загрузка данных
async function loadData(){
  const icon = document.getElementById("syncIcon");
  icon.classList.add("syncing"); // старт анимации
  try{
    let res = await fetch(API_URL)
    let text = await res.text()
    if(text !== lastData){
      lastData = text
      let data = JSON.parse(text)
      todo = data.todo || []
      done = data.done || []
      render()
    }
  }catch(e){
    console.log("Ошибка загрузки",e)
  }
  icon.classList.remove("syncing"); // стоп анимации
}

// Ручная синхронизация
async function manualSync(){
  await loadData()
}

// Сохранение
async function saveData(){
  try{
    await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({todo:todo, done:done})
    })
  }catch(e){
    console.log("Ошибка сохранения", e)
  }
}

// Поиск
function clearSearch(){
  document.getElementById("searchInput").value=""
  toggleClear()
  render()
}
function toggleClear(){
  let input=document.getElementById("searchInput").value
  let btn=document.getElementById("clearSearch")
  btn.style.display = input.length>0 ? "block" : "none"
}

// Редактирование единицы
function editUnit(index,list){
  editUnitIndex=index
  editUnitList=list
  document.getElementById("unitModal").style.display="flex"
}
function setUnit(unit){
  let arr = editUnitList==="todo"?todo:done
  arr[editUnitIndex].unit=unit
  saveData()
  render()
  closeUnitModal()
}
function closeUnitModal(){ document.getElementById("unitModal").style.display="none" }

// Отрисовка списка
function render(){
  searchText = document.getElementById("searchInput").value.toLowerCase()
  let todoList=document.getElementById("todoList")
  let doneList=document.getElementById("doneList")
  todoList.innerHTML=""
  doneList.innerHTML=""

  todo.forEach((item,index)=>{
    if(searchText && !item.name.toLowerCase().includes(searchText)) return
    let li=document.createElement("li")
    li.innerHTML=`
      <div class="leftPart">
        <input type="checkbox" onchange="completeItem(${index})">
        <span>${item.name}</span>
      </div>
      <span class="itemAmount">
        <button onclick="changeAmount(${index},'todo',-1)">-</button>
        <span onclick="editAmount(${index},'todo')">${item.amount}</span>
        <button onclick="changeAmount(${index},'todo',1)">+</button>
        <span onclick="editUnit(${index},'todo')" style="cursor:pointer">${item.unit}</span>
      </span>
    `
    todoList.appendChild(li)
  })

  done.forEach((item,index)=>{
    if(searchText && !item.name.toLowerCase().includes(searchText)) return
    let li=document.createElement("li")
    li.innerHTML=`
      <div class="leftPart">
        <input type="checkbox" checked onchange="undoItem(${index})">
        <span class="doneText">${item.name}</span>
      </div>
      <span class="itemAmount">
        ${item.amount}
        <span onclick="editUnit(${index},'done')" style="cursor:pointer">${item.unit}</span>
      </span>
      <button onclick="deleteDone(${index})">❌</button>
    `
    doneList.appendChild(li)
  })
}

// Модальные окна
function openModal(){
  document.getElementById("modal").style.display="flex"
  setTimeout(()=>{document.getElementById("nameInput").focus()},100)
}
function closeModal(){ document.getElementById("modal").style.display="none" }

// Добавление товара
function addItem(){
  let name=document.getElementById("nameInput").value.trim()
  let amount=document.getElementById("amountInput").value
  let unit=document.getElementById("unitInput").value
  if(name==="") return
  if(amount==="") amount=1
  todo.push({name:name, amount:Number(amount), unit:unit})
  saveData()
  document.getElementById("nameInput").value=""
  document.getElementById("amountInput").value=""
  closeModal()
  render()
}

// Остальные действия
function completeItem(index){ done.push(todo[index]); todo.splice(index,1); saveData(); render() }
function undoItem(index){ todo.push(done[index]); done.splice(index,1); saveData(); render() }
function deleteDone(index){ done.splice(index,1); saveData(); render() }
function changeAmount(index,list,delta){
  let arr = list==="todo"?todo:done
  arr[index].amount = Number(arr[index].amount)+delta
  if(arr[index].amount<1) arr[index].amount=1
  saveData()
  render()
}
function editAmount(index,list){
  let arr = list==="todo"?todo:done
  let value = prompt("Введите количество",arr[index].amount)
  if(value!==null && value!==""){
    arr[index].amount=Number(value)
    saveData()
    render()
  }
}

// drag & drop
new Sortable(document.getElementById("todoList"),{
  animation:150,
  onEnd:function(evt){
    let movedItem = todo.splice(evt.oldIndex,1)[0]
    todo.splice(evt.newIndex,0,movedItem)
    saveData()
  }
})

// Загрузка данных при запуске
loadData()

</script>

</body>
</html>
