<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Список покупок</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
}

ul{
list-style:none;
padding:0;
}

li{
background:white;
padding:12px;
margin-bottom:8px;
display:flex;
align-items:center;
justify-content:space-between;
border-radius:8px;
}

.leftPart{
display:flex;
align-items:center;
gap:10px;
}

.doneText{
text-decoration:line-through;
color:gray;
}

.sectionTitle{
margin-top:30px;
font-weight:bold;
}

/* FAB кнопка */

.fab{

position:fixed;
bottom:25px;
right:25px;

width:60px;
height:60px;

border-radius:50%;
border:none;

font-size:32px;

background:#2ecc71;
color:white;

cursor:pointer;

box-shadow:0 4px 10px rgba(0,0,0,0.3);

}

/* Модальное окно */

.modal{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.4);

display:none;

align-items:center;
justify-content:center;

}

.modalContent{

background:white;
padding:20px;
border-radius:10px;
width:250px;

display:flex;
flex-direction:column;
gap:10px;

}

.modalContent input{

padding:8px;
font-size:16px;

}

.modalContent button{

padding:8px;

}

</style>
</head>

<body>

<h1>🛒 Список покупок</h1>

<div class="sectionTitle">🧺 Нужно купить</div>

<ul id="todoList"></ul>

<div class="sectionTitle">✅ Куплено</div>

<ul id="doneList"></ul>

<!-- Кнопка + -->

<button class="fab" onclick="openModal()">+</button>

<!-- Модальное окно -->

<div class="modal" id="modal">

<div class="modalContent">

<input id="itemInput" placeholder="Название товара">

<button onclick="addItem()">OK</button>

<button onclick="closeModal()">Отмена</button>

</div>

</div>

<script>

let todo=[]
let done=[]

function render(){

let todoList=document.getElementById("todoList")
let doneList=document.getElementById("doneList")

todoList.innerHTML=""
doneList.innerHTML=""

todo.forEach((item,index)=>{

let li=document.createElement("li")

li.innerHTML=`

<div class="leftPart">

<input type="checkbox" onchange="completeItem(${index})">

<span>${item}</span>

</div>

<button onclick="deleteItem(${index})">❌</button>

`

todoList.appendChild(li)

})

done.forEach((item,index)=>{

let li=document.createElement("li")

li.innerHTML=`

<div class="leftPart">

<input type="checkbox" checked onchange="undoItem(${index})">

<span class="doneText">${item}</span>

</div>

<button onclick="deleteDone(${index})">❌</button>

`

doneList.appendChild(li)

})

}

function openModal(){

document.getElementById("modal").style.display="flex"

}

function closeModal(){

document.getElementById("modal").style.display="none"

}

function addItem(){

let input=document.getElementById("itemInput")

let value=input.value.trim()

if(value==="") return

todo.push(value)

input.value=""

closeModal()

render()

}

function completeItem(index){

done.push(todo[index])

todo.splice(index,1)

render()

}

function undoItem(index){

todo.push(done[index])

done.splice(index,1)

render()

}

function deleteItem(index){

todo.splice(index,1)

render()

}

function deleteDone(index){

done.splice(index,1)

render()

}

render()

</script>

</body>
</html>
