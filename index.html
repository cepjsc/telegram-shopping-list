<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Список покупок</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
  max-width:600px;
  margin:0 auto;
}

input[type="checkbox"]{
  width:18px;
  height:18px;
  cursor:pointer;
}

h1{text-align:center;}
ul{list-style:none; padding:0;}

li{
  background:white;
  padding:14px 16px;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-radius:16px;

  font-size:17px;

  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: all 0.25s ease;
}

li:active{
  transform: scale(0.98);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

li.moving {
  opacity:0.5;
  transform:translateY(10px);
}

.leftPart{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
}

.itemAmount{
  display:flex;
  align-items:center;
  gap:6px;
  background:#f3f3f3;
  padding:4px 8px;
  border-radius:10px;
}

.itemAmount button{
  padding:2px 6px;
  font-size:14px;
  border:none;
  background:white;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

.itemAmount button:active{
  transform:scale(0.9);
}

.itemAmount span:last-child{
  margin-left:4px;
  font-size:13px;
  color:#666;
  cursor:pointer;
}

.doneText{
  position:relative;
  display:inline-block;
}

.doneText::after{
  content:"";
  position:absolute;
  left:0;
  top:50%;
  width:0%;
  height:2px;
  background:#888;
  transition: width 0.4s ease;
}

.doneText.animateDone::after{
  width:100%;
}

.doneText.animateDone{
  color:gray;
  opacity:0.7;
  transition: all 1.3s ease;
}

.sectionTitle{
  margin-top:30px;
  font-weight:bold;
}

/* кнопка + */
.fab{
  position:fixed;
  bottom:25px;
  right:25px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:32px;
  background:#2ecc71;
  color:white;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* модальные окна */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalContent{
  background:white;
  padding:20px;
  border-radius:10px;
  width:260px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.modalContent input,
.modalContent select{
  padding:8px;
  font-size:16px;
}

.modalContent button{
  padding:8px;
}

/* анимация синхронизации */
@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.syncing {
  animation: rotate 1s linear infinite;
}

.editInput{
  font-size:18px;
  padding:4px 6px;
  border-radius:6px;
  border:1px solid #ccc;
}

.editButtons{
  display:flex;
  gap:5px;
}

.editButtons button{
  padding:4px 6px;
  font-size:14px;
}

.amountInput{
  width:40px;
  border:none;
  background:transparent;
  font-size:15px;
  text-align:center;
  outline:none;
  font-weight:bold;
}
.doneList li{
  background:#fafafa;
  box-shadow:none;
}
.version{
  font-size:14px;
  color:#888;
  margin-left:6px;
}

.doneList .doneText{
  text-decoration: line-through;
  opacity:0.4;
}

.doneList button{
  border:none;
  background:none;
  font-size:16px;
  opacity:0.6;
  cursor:pointer;
}

.doneList button:active{
  transform:scale(0.85);
}

</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>

<body>

<h1>
  🛒 Список покупок 
  <span class="version">v1.6.1</span>
</h1>

<div style="display:flex;align-items:center;gap:10px;margin:10px 0 20px 0;">

  <div style="position:relative; flex-grow:1; max-width:250px;">
    <input 
      id="searchInput"
      placeholder="🔍 Поиск..."
      oninput="render();toggleClear()"
      style="width:100%;padding:8px 30px 8px 10px;font-size:15px;border-radius:8px;border:1px solid #ccc;"
    >
    <span 
      id="clearSearch"
      onclick="clearSearch()"
      style="position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;color:#888;display:none;"
    >✖</span>
  </div>

  <div id="syncContainer" style="margin-left:auto; cursor:pointer;" onclick="manualSync()">
    <span id="syncIcon" style="display:inline-block; font-size:20px;">🔄</span>
  </div>

</div>

<div class="sectionTitle">🧺 Нужно купить</div>
<ul id="todoList"></ul>

<div class="sectionTitle">✅ Куплено</div>
<ul id="doneList" class="doneList"></ul>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal">
  <div class="modalContent">
    <input id="nameInput" placeholder="Название товара">
    <input id="amountInput" type="number" placeholder="Количество">
    <select id="unitInput">
      <option value="шт">шт</option>
      <option value="кг">кг</option>
      <option value="г">г</option>
      <option value="л">л</option>
      <option value="уп">уп</option>
    </select>
    <button onclick="addItem()">OK</button>
    <button onclick="closeModal()">Отмена</button>
  </div>
</div>

<div class="modal" id="unitModal">
  <div class="modalContent">
    <b>Выберите единицу</b>
    <button onclick="setUnit('шт')">шт</button>
    <button onclick="setUnit('кг')">кг</button>
    <button onclick="setUnit('г')">г</button>
    <button onclick="setUnit('л')">л</button>
    <button onclick="setUnit('уп')">уп</button>
    <button onclick="closeUnitModal()">Отмена</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxS1TAlGtBXdksEppy27IksJfLF8L02M-OV7v6rR8MbgRfFJXxrAj2WDtUEo9nQWevV/exec"

let editUnitIndex=null
let editUnitList=null
let todo=[]
let done=[]
let searchText=""

// =================== ЗАГРУЗКА ===================
async function loadData(){

  const icon = document.getElementById("syncIcon");
  icon.classList.add("syncing");

  try{

    let res = await fetch(API_URL)
    let data = await res.json()

    todo = (data.todo || []).filter(i=>i && i.name)
    done = (data.done || []).filter(i=>i && i.name)

    render()
    toggleClear()

  }catch(e){

    console.log("Ошибка загрузки",e)

  } finally {

    icon.classList.remove("syncing");

  }
}

function manualSync(){ loadData() }

// =================== СОХРАНЕНИЕ ===================
async function saveData(){
  try{
    await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({todo:todo, done:done})
    })
  }catch(e){ console.log("Ошибка сохранения", e) }
}

// =================== ПОИСК ===================
function clearSearch(){
  document.getElementById("searchInput").value=""
  toggleClear()
  render()
}

function toggleClear(){
  let input=document.getElementById("searchInput").value
  let btn=document.getElementById("clearSearch")
  btn.style.display = input.length>0 ? "block" : "none"
}

// =================== РЕНДЕР ===================
function render(){

  searchText = document.getElementById("searchInput").value.toLowerCase()

  const todoList=document.getElementById("todoList")
  const doneList=document.getElementById("doneList")

  todoList.innerHTML=""
  doneList.innerHTML=""

  // Активные
  todo.forEach((item,index)=>{

    if(searchText && !(item.name || "").toLowerCase().includes(searchText)) return

    const li=document.createElement("li")
    li.dataset.index=index

    li.innerHTML = `
      <div class="leftPart">
        <input type="checkbox" onchange="completeItem(this)">
        <span class="doneText" onclick="startEditName(${index},'todo',this)">
        ${item.name}
        </span>
      </div>
      <span class="itemAmount">
        <button onclick="changeAmount(${index},'todo',-1)">-</button>
        <input 
          class="amountInput"
          value="${item.amount}"
          inputmode="decimal"
          oninput="editAmount(${index},'todo',this.value)"
          onblur="render()"
        />
        <button onclick="changeAmount(${index},'todo',1)">+</button>
        <span onclick="editUnit(${index},'todo')" style="cursor:pointer">${item.unit}</span>
      </span>
    `

    todoList.appendChild(li)
  })


  // Завершенные
  done.forEach((item,index)=>{

    if(searchText && !(item.name || "").toLowerCase().includes(searchText)) return

    const li=document.createElement("li")
    li.dataset.index=index

    li.innerHTML=`
      <div class="leftPart">
        <input type="checkbox" checked onchange="undoItem(this)">
        <span class="doneText" onclick="startEditName(${index},'done',this)">
        ${item.name}
        </span>
      </div>
      <span class="itemAmount">
        ${item.amount}
        <span onclick="editUnit(${index},'done')" style="cursor:pointer">${item.unit}</span>
      </span>
      <button onclick="deleteDone(${index})">❌</button>
    `

    doneList.appendChild(li)
  })

}

// =================== АНИМАЦИЯ ПЕРЕНОСА ===================
function completeItem(el){

  const li = el.closest("li")
  const index = Number(li.dataset.index)
  const text = li.querySelector(".doneText")

  // 1. запускаем зачеркивание
  text.classList.add("animateDone")

  // 2. чуть ждём, потом движение
  setTimeout(()=>{
    li.classList.add("moving")
  },400)

  // 3. перенос
  setTimeout(()=>{
    done.unshift(todo[index])
    todo.splice(index,1)
    saveData()
    render()
  },700)
}

function undoItem(el){

  const li = el.closest("li")
  const index = Number(li.dataset.index)

  li.classList.add("moving")

  setTimeout(()=>{
    todo.unshift(done[index])
    done.splice(index,1)
    saveData()
    render()
  },300)
}

// =================== ПРОЧЕЕ ===================
function deleteDone(index){
  done.splice(index,1)
  saveData()
  render()
}

function changeAmount(index,list,delta){

  let arr = list==="todo"?todo:done

  let current = parseFloat(arr[index].amount) || 0

  let step

  if(delta > 0){
    // увеличение
    step = current < 1 ? 0.5 : 1
  } else {
    // уменьшение
    step = current > 1 ? 1 : 0.5
  }

  let newValue = current + (delta * step)

  if(newValue < 0.5) newValue = 0.5

  newValue = Math.round(newValue * 10) / 10

  arr[index].amount = newValue

  saveData()
  render()
}

function editAmount(index,list,value){

  let arr = list==="todo"?todo:done

  value = value.replace(",", ".")

  let num = parseFloat(value)

  if(!isNaN(num) && num > 0){
    arr[index].amount = num
    saveData()
  }
}

// =================== ЕДИНИЦЫ ===================
function editUnit(index,list){
  editUnitIndex=index
  editUnitList=list
  document.getElementById("unitModal").style.display="flex"
}

function setUnit(unit){
  let arr = editUnitList==="todo"?todo:done
  arr[editUnitIndex].unit=unit
  saveData()
  render()
  closeUnitModal()
}

function closeUnitModal(){
  document.getElementById("unitModal").style.display="none"
}

// =================== ДОБАВЛЕНИЕ ===================
function openModal(){
  document.getElementById("modal").style.display="flex"
  setTimeout(()=>{document.getElementById("nameInput").focus()},100)
}

function closeModal(){
  document.getElementById("modal").style.display="none"
}

function addItem(){
  let name=document.getElementById("nameInput").value.trim()
  let amount=document.getElementById("amountInput").value
  let unit=document.getElementById("unitInput").value

  if(name==="") return
  if(amount==="") amount=1

  todo.unshift({name:name, amount:Number(amount), unit:unit})

  saveData()

  document.getElementById("nameInput").value=""
  document.getElementById("amountInput").value=""
  closeModal()
  render()
}

// =================== DRAG ===================
new Sortable(document.getElementById("todoList"),{
  animation:150,

  delay:300,                 // удержание 300 мс
  delayOnTouchOnly:true,     // только на телефоне
  touchStartThreshold:5,     // защита от случайного движения

  onEnd:function(evt){
    let movedItem = todo.splice(evt.oldIndex,1)[0]
    todo.splice(evt.newIndex,0,movedItem)
    saveData()
  }
})

// =================== СТАРТ ===================
loadData()

function startEditName(index,list,element){

  let arr = list==="todo"?todo:done
  let oldName = arr[index].name

  const parent = element.parentElement

  parent.innerHTML = `
    <input class="editInput" id="editField" value="${oldName}">
    <div class="editButtons">
      <button onclick="saveEditName(${index},'${list}')">✔</button>
      <button onclick="render()">✖</button>
    </div>
  `

  document.getElementById("editField").focus()
}

function saveEditName(index,list){

  let arr = list==="todo"?todo:done
  let value = document.getElementById("editField").value.trim()

  if(value!==""){
    arr[index].name = value
    saveData()
  }

  render()
  toggleClear()
}

</script>

</body>
</html>
