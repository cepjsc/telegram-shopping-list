<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Список покупок</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
  max-width:600px;
  margin:0 auto;
}

h1{text-align:center;}
ul{list-style:none; padding:0;}

li{
  background:white;
  padding:18px 20px;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-radius:12px;
  font-size:18px;
  transition: all 0.4s ease;
}

li.moving {
  opacity:0.5;
  transform:translateY(10px);
}

.leftPart{
  display:flex;
  align-items:center;
  gap:10px;
}

.itemAmount{
  display:flex;
  align-items:center;
  gap:6px;
  color:#555;
  font-size:14px;
}

/* 🔥 ВАЖНО: input для количества */
.amountInput{
  width:60px;
  border:none;
  background:transparent;
  font-size:16px;
  text-align:center;
  outline:none;
}

.doneText{
  color:inherit;
}

.doneList .doneText{
  text-decoration: line-through;
  opacity:0.6;
}

.sectionTitle{
  margin-top:30px;
  font-weight:bold;
}

/* кнопка + */
.fab{
  position:fixed;
  bottom:25px;
  right:25px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:32px;
  background:#2ecc71;
  color:white;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* модальные окна */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalContent{
  background:white;
  padding:20px;
  border-radius:10px;
  width:260px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.modalContent input,
.modalContent select{
  padding:8px;
  font-size:16px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>

<body>

<h1>🛒 Список покупок</h1>

<div style="display:flex;align-items:center;gap:10px;margin:10px 0 20px 0;">
  <input id="searchInput" placeholder="🔍 Поиск..." oninput="render()">
</div>

<div class="sectionTitle">🧺 Нужно купить</div>
<ul id="todoList"></ul>

<div class="sectionTitle">✅ Куплено</div>
<ul id="doneList"></ul>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal">
  <div class="modalContent">
    <input id="nameInput" placeholder="Название товара">
    <input id="amountInput" placeholder="Количество">
    <select id="unitInput">
      <option value="шт">шт</option>
      <option value="кг">кг</option>
      <option value="г">г</option>
      <option value="л">л</option>
      <option value="уп">уп</option>
    </select>
    <button onclick="addItem()">OK</button>
    <button onclick="closeModal()">Отмена</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxS1TAlGtBXdksEppy27IksJfLF8L02M-OV7v6rR8MbgRfFJXxrAj2WDtUEo9nQWevV/exec"

let todo=[]
let done=[]

// ================= LOAD =================
async function loadData(){
  let res = await fetch(API_URL)
  let data = await res.json()

  todo = data.todo || []
  done = data.done || []

  render()
}
function saveData(){
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({todo,done})
  })
}

// ================= RENDER =================
function render(){

  const todoList=document.getElementById("todoList")
  const doneList=document.getElementById("doneList")

  todoList.innerHTML=""
  doneList.innerHTML=""

  todo.forEach((item,index)=>{
    const li=document.createElement("li")

    li.innerHTML=`
      <div class="leftPart">
        <input type="checkbox" onchange="moveToDone(${index})">
        <span>${item.name}</span>
      </div>

      <div class="itemAmount">
        <button onclick="changeAmount(${index},-1)">-</button>

        <input 
          class="amountInput"
          value="${item.amount}"
          inputmode="decimal"
          oninput="updateAmount(${index},this.value)"
        >

        <button onclick="changeAmount(${index},1)">+</button>
        <span>${item.unit}</span>
      </div>
    `
    todoList.appendChild(li)
  })

  done.forEach((item,index)=>{
    const li=document.createElement("li")

    li.innerHTML=`
      <div class="leftPart">
        <input type="checkbox" checked onchange="moveToTodo(${index})">
        <span style="text-decoration:line-through;opacity:0.6">${item.name}</span>
      </div>

      <div class="itemAmount">
        ${item.amount} ${item.unit}
      </div>
    `
    doneList.appendChild(li)
  })
}

// ================= AMOUNT FIX 🔥 =================
function updateAmount(index,value){

  value = value.replace(",", ".")
  let num = parseFloat(value)

  if(!isNaN(num) && num > 0){
    todo[index].amount = num
    saveData()
  }
}

function changeAmount(index,delta){
  let val = parseFloat(todo[index].amount)
  if(isNaN(val)) val = 1

  val += delta
  if(val < 1) val = 1

  todo[index].amount = val
  saveData()
  render()
}

// ================= MOVE =================
function moveToDone(index){
  done.unshift(todo[index])
  todo.splice(index,1)
  saveData()
  render()
}

function moveToTodo(index){
  todo.unshift(done[index])
  done.splice(index,1)
  saveData()
  render()
}

// ================= ADD =================
function openModal(){
  document.getElementById("modal").style.display="flex"
}
function closeModal(){
  document.getElementById("modal").style.display="none"
}

function addItem(){
  let name=document.getElementById("nameInput").value
  let amount=document.getElementById("amountInput").value
  let unit=document.getElementById("unitInput").value

  if(!name) return

  amount = amount.replace(",", ".")
  if(amount==="") amount=1

  todo.unshift({
    name,
    amount:parseFloat(amount),
    unit
  })

  saveData()
  closeModal()
  render()
}

loadData()
</script>

</body>
</html>
