<script>

let todo=[]
let done=[]

let editingIndex=null
let editingList=null

function render(){

let todoList=document.getElementById("todoList")
let doneList=document.getElementById("doneList")

todoList.innerHTML=""
doneList.innerHTML=""

todo.forEach((item,index)=>{

let li=document.createElement("li")

li.innerHTML=`

<div class="leftPart">

<input type="checkbox" onchange="completeItem(${index})">

<span>${item.name}</span>

</div>

<div class="itemAmount">

<button onclick="changeAmount(${index},'todo',-1)">-</button>

<span onclick="openAmountModal(${index},'todo')">${item.amount}</span>

<button onclick="changeAmount(${index},'todo',1)">+</button>

<span>${item.unit}</span>

</div>

`

todoList.appendChild(li)

})

done.forEach((item,index)=>{

let li=document.createElement("li")

li.innerHTML=`

<div class="leftPart">

<input type="checkbox" checked onchange="uncompleteItem(${index})">

<span class="doneText">${item.name}</span>

</div>

<div class="itemAmount">

<span>${item.amount}</span>

<span>${item.unit}</span>

<button onclick="deleteDone(${index})">❌</button>

</div>

`

doneList.appendChild(li)

})

}

function completeItem(index){

done.push(todo[index])
todo.splice(index,1)

render()

}

function uncompleteItem(index){

todo.push(done[index])
done.splice(index,1)

render()

}

function deleteDone(index){

done.splice(index,1)
render()

}

function openModal(){

document.getElementById("modal").style.display="flex"

setTimeout(()=>{
document.getElementById("nameInput").focus()
},100)

}

function closeModal(){

document.getElementById("modal").style.display="none"

}

function addItem(){

let name=document.getElementById("nameInput").value
let amount=document.getElementById("amountInput").value
let unit=document.getElementById("unitInput").value

if(name==="") return

if(amount==="") amount=1

todo.push({
name:name,
amount:Number(amount),
unit:unit
})

document.getElementById("nameInput").value=""
document.getElementById("amountInput").value=""

closeModal()

render()

}

function changeAmount(index,list,delta){

let arr=list==="todo"?todo:done

arr[index].amount+=delta

if(arr[index].amount<1) arr[index].amount=1

render()

}

function openAmountModal(index,list){

editingIndex=index
editingList=list

let arr=list==="todo"?todo:done

document.getElementById("amountEditInput").value=arr[index].amount

document.getElementById("amountModal").style.display="flex"

setTimeout(()=>{
document.getElementById("amountEditInput").focus()
},100)

}

function closeAmountModal(){

document.getElementById("amountModal").style.display="none"

}

function confirmAmount(){

let value=document.getElementById("amountEditInput").value

let arr=editingList==="todo"?todo:done

arr[editingIndex].amount=Number(value)

closeAmountModal()

render()

}

render()

</script>
